spring.application.name=wsms
server.port=${PORT:8080}
# spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/wsms}
# spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
# spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.jwt.secret=${APP_JWT_SECRET:Q29kZXhXU01TX0pXVF9TRUNSRVRfS0VZX0ZPUl9IUzI1Nl9NVVNUX0JFX0xPTkdfRU5PVUdIXzIwMjY=}
app.jwt.expiration-ms=86400000
spring.devtools.restart.enabled=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5177,http://127.0.0.1:5173,http://127.0.0.1:5177,http://localhost:4017}
app.terminal.shell=${APP_TERMINAL_SHELL:}

# Metric data retention configuration
# How many days to keep metrics before automatic cleanup (default: 30 days)
app.metrics.retention-days=30

# Enable scheduled tasks
spring.task.scheduling.enabled=true

app.agent.jar-name=server-agent-v4.2.0.jar
app.agent.jar-url=https://wsms-s3.s3.eu-north-1.amazonaws.com/${app.agent.jar-name}

#this smtp cofiguration are in application-secret.properties
spring.config.import=optional:classpath:application-secret.properties

#backend-url
#app.backend.url=http://localhost:8080
app.backend.url=${APP_BACKEND_URL:http://localhost:${server.port}}


#JPA config
spring.jpa.show-sql=false
logging.level.org.hibernate=ERROR

#app.config
app.config.allow-web-client-requests=true
app.config.show-terminal-on-server-setup=true


#
#
# log_config
#
#

# Console log pattern
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file location
logging.file.name=${LOG_FILE_NAME:logs/web-app.log}
# File log pattern
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{16} - %msg%n

# Rolling file policy (daily + size based)
logging.logback.rollingpolicy.file-name-pattern=logs/wsms-app.%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=5GB
logging.logback.rollingpolicy.clean-history-on-start=false

#Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
