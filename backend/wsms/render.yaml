services:
  - type: web
    name: wsms-backend
    runtime: docker
    plan: free
    rootDir: backend/wsms
    autoDeploy: true
    envVars:
      - key: APP_BACKEND_URL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_MAIL_ENABLED
        value: "true"
      - key: SPRING_MAIL_HOST
        sync: false
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_MAIL_SMTP_AUTH
        value: "true"
      - key: SPRING_MAIL_STARTTLS_ENABLE
        value: "true"
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        value: "eu-north-1"
      - key: AWS_S3_BUCKET
        value: "wsms-s3"
